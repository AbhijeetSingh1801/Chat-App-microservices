version: "3.9"

networks:
  backend:
    driver: bridge

volumes:
  auth-db-data:

services:

  # ── MySQL (auth) ────────────────────────────────────────────────────────────
  auth-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./python/src/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - auth-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend

  # ── Auth service (Flask) ────────────────────────────────────────────────────
  auth:
    build: ./python/src/auth
    restart: unless-stopped
    ports:
      - "5001:5000"
    env_file:
      - ./python/src/auth/.env
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - backend

  # ── Gateway (FastAPI) ───────────────────────────────────────────────────────
  gateway:
    build: ./python/src/gateway
    restart: unless-stopped
    ports:
      - "7001:8000"
    env_file:
      - ./python/src/gateway/.env
    depends_on:
      - auth
    networks:
      - backend
